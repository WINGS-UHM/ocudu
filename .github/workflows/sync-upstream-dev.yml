name: Weekly mirror of GitLab dev -> upstream-dev

on:
  workflow_dispatch:
  schedule:
    - cron: "20 10 * * 1,5" 

permissions:
  contents: write
  actions: read
 
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_MIRROR_PAT }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Add/fetch upstream (GitLab)
        run: |
          git remote add upstream https://gitlab.com/ocudu/ocudu.git || true
          git fetch upstream --prune
          git fetch origin upstream-dev || true
      - name: Update upstream-dev on GitHub if upstream/dev has new commits
        run: |
          UPSTREAM=$(git rev-parse upstream/dev)
          CURRENT=$(git rev-parse origin/upstream-dev 2>/dev/null || echo "none")

          echo "Upstream commit: $UPSTREAM"
          echo "Current upstream-dev: $CURRENT"

          if [ "$UPSTREAM" != "$CURRENT" ]; then
            echo "New upstream commit detected. Updating upstream-dev."
            git push origin refs/remotes/upstream/dev:refs/heads/upstream-dev --force
          else
            echo "No updates in upstream/dev. Skipping push."
          fi
