# How to test nighlt/weekly schedules
# Generate a schedule for your branch whit a CI_DESCRIPTION variable
# that contains "Nightly"/"Weekly" and an extra word
# Ex: "Test Weekly", "Nighlty add feature"

include:
  - local: .gitlab/ci/build.yml

stages:
  - ci
  - static
  - build and unit tests
  - zmq
  - test mode
  - rf
  - manual
  - documentation

workflow:
  rules:
    # There is no need to import this file in a child pipeline (same project or multi project)!!!
    # - We always want to run the child pipeline.
    #     Filter is done in the parent trigger job & for each jon inside the child pipeline
    # - ON_X variables are available in the child pipeline because they are inherited from
    #     - Global parent pipeline variables (its workflow:rules)
    #     - Parent trigger job specific variables
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    - if: $CI_PIPELINE_SOURCE == "web"
      variables:
        ON_WEB: "true"
    - if: $CI_PIPELINE_SOURCE == "api"
      variables:
        ON_API: "true"
    - if: $CI_PIPELINE_SOURCE == "schedule"
      variables:
        ON_SCHEDULE: "true"
    - if: $CI_COMMIT_TAG
      variables:
        ON_TAG: "true"
    - if: $CI_MERGE_REQUEST_IID
      variables:
        ON_MR: "true"
      # Why $CI_MERGE_REQUEST_IID instead of $CI_PIPELINE_SOURCE == "merge_request_event" ?
      # Child pipelines in a MR have CI_PIPELINE_SOURCE = parent_pipeline
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        ON_DEFAULT_BRANCH: "true"
    - when: never

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: "1"
  GET_SOURCES_ATTEMPTS: 3
  ARTIFACT_DOWNLOAD_ATTEMPTS: 3
  RESTORE_CACHE_ATTEMPTS: 3
  CLICOLOR_FORCE: 1
  FORCE_COLOR: 1

default:
  interruptible: true
  retry:
    max: 2
    when:
      - unknown_failure
      - api_failure
      - runner_system_failure
      - runner_unsupported
      - unmet_prerequisites
      - scheduler_failure
      - data_integrity_failure

################################################################################
## CI MR
################################################################################

.blocked MRs:
  image: alpine/curl:8.12.1
  retry: 2
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - apk add --no-cache jq
    - |
      REPO_PLUGIN_COMMIT_SHA=$(cat .gitlab/ci/plugin_version.txt)
    - |
      MR_JSON=$(
        curl -s -H "PRIVATE-TOKEN: $CODEBOT_TOKEN" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/blockees?state=opened" | \
        jq --argjson PLUGIN_PROJECT_ID "$PLUGIN_PROJECT_ID" -r '
          .[] 
          | select(.blocked_merge_request.project_id == $PLUGIN_PROJECT_ID) 
          | select(.blocked_merge_request.target_branch == "main") 
          | .blocked_merge_request'
      )
      echo $MR_JSON | jq
    - |
      if test $(echo $MR_JSON | jq '.id' | wc -l) -gt 1; then
        echo "Found multiple plugin MRs blocked by this one! Only 1 is allowed"
        exit 1
      fi

get plugin commit:
  extends: .blocked MRs
  stage: ci
  rules:
    - if: $CI_DISABLE_PLUGINS
      when: never
    - if: $ON_MR
    - if: $ON_WEB
    - if: $ON_API
    - if: $ON_TAG
    - if: $CI_DESCRIPTION =~ /Nightly Build Unit Tests/
    - if: $CI_DESCRIPTION =~ /Nightly E2E Tests/
    - if: $CI_DESCRIPTION =~ /Weekly/
    - if: $CI_DESCRIPTION =~ /Alternative OSs/
  script:
    - |
      CI_PLUGIN_COMMIT_SHA=$(echo $MR_JSON | jq -r '.sha')
      if [[ -z $CI_PLUGIN_COMMIT_SHA ]]; then
        CI_PLUGIN_COMMIT_SHA=$REPO_PLUGIN_COMMIT_SHA
      fi
    - echo "CI_PLUGIN_COMMIT_SHA=$CI_PLUGIN_COMMIT_SHA" >> info.env
    - cat info.env
  artifacts:
    reports:
      dotenv: info.env
  needs: []

validate blocked MRs:
  extends: .blocked MRs
  stage: .post
  rules:
    - if: $ON_MR
  script:
    # Validate the last pipeline is green
    - |
      CI_PLUGIN_MERGE_REQUEST_IID=$(echo $MR_JSON | jq -r '.iid')
      PLUGIN_PROJECT_ID=$(echo $MR_JSON | jq -r '.project_id')
    - |
      if [[ -z $CI_PLUGIN_MERGE_REQUEST_IID ]]; then
        LATEST_PIPELINE_STATUS="success"
      else
        LATEST_PIPELINE_STATUS=$(
          curl -s -H "PRIVATE-TOKEN: $CODEBOT_TOKEN" \
            "${CI_API_V4_URL}/projects/${PLUGIN_PROJECT_ID}/merge_requests/${CI_PLUGIN_MERGE_REQUEST_IID}/pipelines" | \
          jq -r '
            [.[] | select(.source == "merge_request_event")]
            | first
            | .status'
        )
      fi
    - test "$LATEST_PIPELINE_STATUS" = "success"
    # Validate the plugin commit is the same as the one in the MR
    - |
      TO_VALIDATE_PLUGIN_COMMIT_SHA=$(
        echo $MR_JSON | jq -r '
          select(.draft==false) 
          | select(.work_in_progress==false) 
          | select(.merge_when_pipeline_succeeds==true) 
          | select(.has_conflicts==false) 
          | select(.blocking_discussions_resolved==true) 
          | select(.detailed_merge_status=="merge_request_blocked") 
          | .sha'
      )
      if [[ -z $TO_VALIDATE_PLUGIN_COMMIT_SHA ]]; then
        TO_VALIDATE_PLUGIN_COMMIT_SHA=$REPO_PLUGIN_COMMIT_SHA
      fi
      echo "Validating if the related MR is ready, with a successful pipeline and in auto-merge state!"
    - test "$TO_VALIDATE_PLUGIN_COMMIT_SHA" = "$CI_PLUGIN_COMMIT_SHA"
  dependencies:
    - get plugin commit

trigger builder:
  stage: ci
  rules:
    - if: $CI_MERGE_REQUEST_LABELS =~ /ci-no-builder/
      when: never
    - if: $ON_MR
      changes:
        paths:
          - .gitlab/ci/builders/**/*
          - docker/scripts/**/*
  trigger:
    include: .gitlab/ci/builders/.gitlab-ci.yml
    strategy: depend
  needs:
    - job: trigger buildkit
      optional: true
      artifacts: false

trigger buildkit:
  stage: ci
  rules:
    - if: $ON_MR
      changes:
        paths:
          - .gitlab/ci/buildkit-cli/**/*
  trigger:
    include: .gitlab/ci/buildkit-cli/.gitlab-ci.yml
    strategy: depend

trigger docker:
  stage: ci
  rules:
    - if: $CI_MERGE_REQUEST_LABELS =~ /ci-no-docker/
      when: never
    - if: $ON_MR
      changes:
        paths:
          - .gitlab/ci/docker/**/*
          - docker/**/*.{yml,env,json,toml,py,sh,csv,py,toml}
          - docker/**/Dockerfile
          - .gdbinit
    - if: $CI_DESCRIPTION =~ /Nightly Build Unit Tests Plugin/
      variables:
        CI_DESCRIPTION: $CI_DESCRIPTION
    - if: $CI_DESCRIPTION =~ /Weekly/
      variables:
        CI_DESCRIPTION: $CI_DESCRIPTION
  trigger:
    include: .gitlab/ci/docker/.gitlab-ci.yml
    strategy: depend
  variables:
    PY_DIR: docker/metrics_server
  needs:
    - job: trigger buildkit
      optional: true
      artifacts: false

trigger doxygen image:
  stage: ci
  rules:
    - if: $ON_MR
      changes:
        paths:
          - .gitlab/ci/doxygen/**/*
  trigger:
    include: .gitlab/ci/doxygen/.gitlab-ci.yml
    strategy: depend
  needs:
    - job: trigger buildkit
      optional: true
      artifacts: false

matlab nightly:
  stage: ci
  rules:
    - if: $CI_DESCRIPTION =~ /Nightly Build Unit Tests Plugin/
      variables:
        ON_SCHEDULE: "true"
        CI_DESCRIPTION: Nightly
        SRSRAN_COMMIT: $CI_COMMIT_SHA
        NOTIFY_SLACK: "true"
  inherit:
    variables: false
  trigger:
    project: softwareradiosystems/srsgnb_matlab
    branch: master

matlab weekly:
  stage: ci
  rules:
    - if: $CI_DESCRIPTION =~ /Weekly/
      variables:
        ON_SCHEDULE: "true"
        CI_DESCRIPTION: Weekly
        SRSRAN_COMMIT: $CI_COMMIT_SHA
        NOTIFY_SLACK: "true"
  inherit:
    variables: false
  trigger:
    project: softwareradiosystems/srsgnb_matlab
    branch: master

generate nightly plugin:
  stage: ci
  image: ubuntu:24.04
  rules:
    - if: $CI_DESCRIPTION =~ /Nightly Build Unit Tests Plugin/
  variables:
    GIT_STRATEGY: none
  script:
    - |
      echo """
      include:
        - project: softwareradiosystems/ci/tools
          ref: \"21\"
          file: .gitlab/ci-shared/setup/all.yml

      stages:
        - trigger
      """ >> trigger_nightly_plugins.yml

      while IFS='|' read -r PLUGIN_PATH PLUGIN_REPO PLUGIN_REF; do
          echo """
      ${PLUGIN_PATH} nightly:
        stage: trigger
        interruptible: false
        variables:
          ON_SCHEDULE: "true"
          CI_DESCRIPTION: Nightly
          NOTIFY_SLACK: "false"
        trigger:
          project: ${PLUGIN_REPO}
          branch: main
          strategy: depend
      """ >> trigger_nightly_plugins.yml
      done < <(grep -v '^#' "$PLUGINS_DATA_FILE")
    - cat trigger_nightly_plugins.yml
  artifacts:
    paths:
      - trigger_nightly_plugins.yml
    expire_in: 1 day

plugin nightly:
  stage: ci
  interruptible: false
  rules:
    - if: $CI_DESCRIPTION =~ /Nightly Build Unit Tests Plugin/
  inherit:
    variables: false
  trigger:
    include:
      - artifact: trigger_nightly_plugins.yml
        job: generate nightly plugin
    strategy: depend
  needs:
    - job: generate nightly plugin
      artifacts: true

################################################################################
## Static
################################################################################
.static:
  image: ubuntu:24.04
  stage: static
  rules:
    - if: $ON_MR
      exists:
        - "**/*.cpp"
        - "**/*.c"
        - "**/*.c++"
        - "**/*.cxx"
        - "**/*.c"
        - "**/*.cl"
        - "**/*.h"
        - "**/*.hh"
        - "**/*.hpp"
  needs: []
  variables:
    CPP_SRC_DIR: $CI_PROJECT_DIR
    GIT_DEPTH: 0
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - |
      DEBIAN_FRONTEND=noninteractive TZ=Europe/Madrid apt-get update && apt-get install -y --no-install-recommends \
        clang-format git colordiff apt-transport-https ca-certificates gawk
  artifacts:
    paths:
      - $CPP_SRC_DIR/ci.patch
    when: on_failure

code-format:
  extends: .static
  script:
    - |
      check_code_format() {
        .gitlab/ci/static/run-clang-format-diff.sh $CI_MERGE_REQUEST_DIFF_BASE_SHA
        .gitlab/ci/static/hex2lowercase.sh
        .gitlab/ci/static/is-pristine-repo.sh
      }
    - cd $CPP_SRC_DIR
    - check_code_format

full-code-format:
  extends: .static
  rules:
    - if: $ON_MR
      changes:
        - .clang-format
  script:
    - |
      full_code_format() {
        FILE_EXTENSION_REGEX='.*\.(cpp|cc|c\+\+|cxx|c|cl|h|hh|hpp)$'
        files=$(find . | grep -E "${FILE_EXTENSION_REGEX}" | tr '\n' ' ')
        clang-format -style=file -i ${files}
        .gitlab/ci/static/hex2lowercase.sh
        .gitlab/ci/static/is-pristine-repo.sh
      }
    - cd $CPP_SRC_DIR
    - full_code_format

include-guards:
  extends: .static
  variables:
    AUTOCORRECTION: 1
    PRAGMA: 1
    TARGET_BRANCH: origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    INPUT_PATH: "."
    INPUT_IGNORE: "/bundled/"
  rules:
    - if: $ON_MR
      changes:
        - .clang-format
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Nightly/
  script:
    - |
      include-guards-check() {
        EXIT_CODE=0
        .gitlab/ci/static/include-guards-check.sh || EXIT_CODE=$?
        .gitlab/ci/static/is-pristine-repo.sh || EXIT_CODE=$?
        exit $EXIT_CODE
      }
    - cd $CPP_SRC_DIR
    - include-guards-check
  parallel:
    matrix:
      - INPUT_PATH: "include/srsran"
        INPUT_IGNORE: "/bundled/"
      - INPUT_PATH: "."
        INPUT_IGNORE: "^\\(include\\|docs\\|external\\)/.*"

.codechecker:
  image: ${CI_REGISTRY_IMAGE}/codechecker:${DOCKER_BUILDER_VERSION}
  stage: static
  tags:
    - amd64
  needs:
    - job: trigger builder
      optional: true
      artifacts: false
  variables:
    ANALYZER: ""
    ANALYZER_ARGS: ""
    ARTIFACT_EXTRA_PATH: ""
    KUBERNETES_CPU_REQUEST: ${SRS_CPU_LIMIT}
    KUBERNETES_CPU_LIMIT: ${SRS_CPU_LIMIT}
    KUBERNETES_MEMORY_REQUEST: ${SRS_MEMORY_LIMIT}
    KUBERNETES_MEMORY_LIMIT: ${SRS_MEMORY_LIMIT}
    CHECK_PER_FILE_TIMEOUT: 600
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - |
      echo "
      -/usr/lib
      -*CMakeTmp
      -*CompilerIdCXX
      -*tests/unittests
      -*tests/integrationtests
      -*tests/benchmarks
      -*benchmarks
      -*apps/examples
      -*external
      -*lib/asn1
      -*lib/phy/generic_functions/fftx/lib_fftx_dftbat_srcs
      -*lib/phy/generic_functions/fftx/lib_fftx_idftbat_srcs" >/tmp/codechecker_skip
    - |
      export CC=/usr/bin/clang
      export CXX=/usr/bin/clang++
      mkdir -p build
      cd build || exit
      cmake -DASSERT_LEVEL=PARANOID -DMARCH=x86-64-v3 -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DBUILD_TESTING=False ..
      make srsran_versioning # needed to generate hashes.h
    - |
      monitor_child_process() {
          while true; do
              ps -eo comm,pid,etimes | grep ${ANALYZER} | while read comm pid etimes; do
                  if [ $etimes -gt $CHECK_PER_FILE_TIMEOUT ]; then
                      echo "Killing child analysis process"
                      kill $pid
                  fi
              done
              sleep 30
          done
      }
      export -f monitor_child_process
  script: &codechecker_script
    - nohup bash -c monitor_child_process &
    - static-analyzer.sh -i /tmp/codechecker_skip --jobs ${KUBERNETES_CPU_REQUEST} --analyzers ${ANALYZER} ${ANALYZER_ARGS} $CI_PROJECT_DIR
  after_script:
    - mv codechecker_html codechecker-${ANALYZER}-html
  artifacts: &codechecker_artifacts
    reports:
      codequality: code-quality-report.json
    paths:
      - codechecker-${ANALYZER}-html${ARTIFACT_EXTRA_PATH}
    when: always
    expire_in: 10 minutes

clang-tidy:
  extends: .codechecker
  rules:
    - if: $CI_DESCRIPTION =~ /Nightly Build Unit Tests/
  interruptible: false
  retry: 2
  variables:
    ANALYZER: clang-tidy
    ANALYZER_ARGS: --analyzer-config clang-tidy:take-config-from-directory=true --tidy-config .clang-tidy
    ARTIFACT_EXTRA_PATH: "/index.html"

clang-tidy incremental:
  extends: clang-tidy
  stage: manual
  rules:
    - if: $ON_MR == "true" && $CI_MERGE_REQUEST_TARGET_BRANCH_PROTECTED == "true" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME != $CI_DEFAULT_BRANCH
      when: never
    - if: $ON_MR == "true" && $CI_MERGE_REQUEST_APPROVED == "true"
    - if: $ON_MR
      when: manual
      allow_failure: false
  variables:
    CCACHE_MAXSIZE: 3G
    CACHE_COMPRESSION_LEVEL: slowest
    CACHE_REQUEST_TIMEOUT: 5 # minutes - 10 by default
  script:
    - |
      cd $CI_PROJECT_DIR
      git config advice.detachedHead false
      git config --local core.hooksPath /dev/null
      git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
    - |
      for rev in $CI_MERGE_REQUEST_TARGET_BRANCH_NAME $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME; do
        git checkout $rev
        CodeChecker log -o ${CI_PROJECT_DIR}/build/compile_commands.json --build "builder.sh -m -j${KUBERNETES_CPU_REQUEST} -c clang -DMARCH=x86-64-v3 -DENABLE_ARMPL=False -DENABLE_MKL=False -DENABLE_FFTW=True -DASSERT_LEVEL=PARANOID -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=False $CI_PROJECT_DIR"
      done
    - *codechecker_script
  cache:
    - key: codechecker-clang-tidy
      paths: [ccache]
      policy: pull-push
      when: always

cppcheck:
  extends: .codechecker
  rules:
    - if: $CI_DESCRIPTION =~ /Nightly Build Unit Tests/
  interruptible: false
  timeout: 2 hours
  retry: 2
  variables:
    ANALYZER: cppcheck
    ANALYZER_ARGS: --cppcheck-max-template-recursion 5
  artifacts:
    <<: *codechecker_artifacts
    expire_in: 7 days

clangsa:
  extends: .codechecker
  rules:
    - if: $CI_DESCRIPTION =~ /Nightly Build Unit Tests/
      when: manual
      allow_failure: true
    - if: $CI_DESCRIPTION =~ /Weekly/
      when: manual
      allow_failure: true
  interruptible: false
  variables:
    ANALYZER: clangsa
    ANALYZER_ARGS: --ctu
  timeout: 8 hours

