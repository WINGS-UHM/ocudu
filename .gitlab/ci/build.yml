######
# MR #
######

# Smoke builds in PR: with or without cache

smoke relwithdeb cached:
  extends: .smoke relwithdeb
  timeout: 1 hour
  rules:
    - if: $CI_MERGE_REQUEST_LABELS =~ /ci-no-cache/
      when: never
    - if: $ON_MR
  cache:
    - *cache_build_get

smoke tsan cached:
  extends: .smoke tsan
  stage: manual
  timeout: 1 hour
  rules:
    - if: $CI_MERGE_REQUEST_LABELS =~ /ci-no-cache/
      when: never
    - if: $ON_MR == "true" && $CI_MERGE_REQUEST_APPROVED == "true"
    - if: $ON_MR
      when: manual
      allow_failure: false
  cache:
    - *cache_build_get

smoke archlinux cached:
  extends: .smoke archlinux
  stage: manual
  timeout: 1 hour
  rules:
